name: release-binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  LITE_XL_REPOSITORY: lite-xl/lite-xl
  LITE_XL_REF: v2.1.8

jobs:
  build:
    name: Build web_lxl for ${{ matrix.lpm_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lpm_arch: aarch64-darwin
            runner: macos-15
            machine_arch: arm64
          - lpm_arch: x86_64-darwin
            runner: macos-15-intel
            machine_arch: x86_64

    steps:
      - name: Check out lite-xl-web
        uses: actions/checkout@v4

      - name: Check out Lite XL headers
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LITE_XL_REPOSITORY }}
          ref: ${{ env.LITE_XL_REF }}
          path: lite-xl

      - name: Verify native runner
        run: |
          set -euo pipefail
          test "$(uname -m)" = "${{ matrix.machine_arch }}"
          xcode-select --print-path
          test -f "lite-xl/resources/include/lite_xl_plugin_api.h"

      - name: Install build tools
        run: brew install cmake ninja

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLITE_XL_INCLUDE_DIR="$PWD/lite-xl/resources/include"
          -DLXL_WEB_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage release asset
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="web_lxl.${{ matrix.lpm_arch }}.lib"
          cp "libraries/web_lxl/init.lib" "dist/${asset}"
          file "dist/${asset}"
          lipo -archs "dist/${asset}" | grep -qw "${{ matrix.machine_arch }}"
          shasum -a 256 "dist/${asset}" | tee "dist/${asset}.sha256"
          {
            echo "### ${{ matrix.lpm_arch }} release asset"
            echo
            echo "\`\`\`"
            cat "dist/${asset}.sha256"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_lxl-${{ matrix.lpm_arch }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
