name: release-binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  LITE_XL_REPOSITORY: lite-xl/lite-xl
  LITE_XL_REF: v2.1.8

jobs:
  build:
    name: Build web_lxl for ${{ matrix.lpm_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lpm_arch: aarch64-darwin
            runner: macos-15
            os: macos
            machine_arch: arm64
            file_arch_pattern: arm64
            module_suffix: lib
          - lpm_arch: x86_64-darwin
            runner: macos-15-intel
            os: macos
            machine_arch: x86_64
            file_arch_pattern: x86_64
            module_suffix: lib
          - lpm_arch: x86_64-linux
            runner: ubuntu-24.04
            os: linux
            machine_arch: x86_64
            file_arch_pattern: x86-64
            module_suffix: so
          - lpm_arch: aarch64-linux
            runner: ubuntu-24.04-arm
            os: linux
            machine_arch: aarch64
            file_arch_pattern: aarch64
            module_suffix: so

    steps:
      - name: Check out lite-xl-web
        uses: actions/checkout@v4

      - name: Check out Lite XL headers
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LITE_XL_REPOSITORY }}
          ref: ${{ env.LITE_XL_REF }}
          path: lite-xl

      - name: Verify native runner
        run: |
          set -euo pipefail
          test "$(uname -m)" = "${{ matrix.machine_arch }}"
          if [ "${{ matrix.os }}" = "macos" ]; then
            xcode-select --print-path
          fi
          test -f "lite-xl/resources/include/lite_xl_plugin_api.h"

      - name: Install macOS build tools
        if: matrix.os == 'macos'
        run: brew install cmake ninja

      - name: Install Linux build tools
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLITE_XL_INCLUDE_DIR="$PWD/lite-xl/resources/include"
          -DLXL_WEB_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage release asset
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="web_lxl.${{ matrix.lpm_arch }}.${{ matrix.module_suffix }}"
          cp "libraries/web_lxl/init.${{ matrix.module_suffix }}" "dist/${asset}"
          file "dist/${asset}"
          if [ "${{ matrix.os }}" = "macos" ]; then
            lipo -archs "dist/${asset}" | grep -qw "${{ matrix.machine_arch }}"
            shasum -a 256 "dist/${asset}" | tee "dist/${asset}.sha256"
          else
            file "dist/${asset}" | grep -qi "${{ matrix.file_arch_pattern }}"
            sha256sum "dist/${asset}" | tee "dist/${asset}.sha256"
          fi
          {
            echo "### ${{ matrix.lpm_arch }} release asset"
            echo
            echo "\`\`\`"
            cat "dist/${asset}.sha256"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_lxl-${{ matrix.lpm_arch }}
          path: dist/*
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
